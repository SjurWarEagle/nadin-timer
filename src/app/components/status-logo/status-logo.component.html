<div
  [hidden]="isDone()"
  class="divider-logo"
  style="transform: translateY(-10%)"
  [@secondsUpdated]="isSecondsEven() ? 'even' : 'uneven'"
>
  <app-nadin-logo
  ></app-nadin-logo>
</div>

<img
  [hidden]="!isDone()"
  class="divider-logo-finished"
  [src]="'../../assets/app-logos/'+finishIcon()"
  alt="timer finished"
/>
